version: "2"
run:
  modules-download-mode: readonly
# errcheck, staticcheck, govet, ineffassign, unused, gocyclo (min-complexity 15)
# gosec disabled: many false positives (G117/G304/G703/G704/G306) in config/tests
linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
    - gocyclo
  settings:
    gocyclo:
      min-complexity: 15
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
